<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Pizza & Burger Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --status-bg: rgba(255, 183, 3, 0.1);
            --status-text: var(--accent-gold);
        }
        body { background: #050505; color: white; min-height: 100vh; }
        .orders-hero { padding: 80px 0 40px; text-align: center; background: radial-gradient(circle at top, #1a0a0a, transparent); }
        
        .tab-container { max-width: 800px; margin: 0 auto 3rem; display: flex; justify-content: center; gap: 1rem; }
        .tab-btn { background: transparent; border: 1px solid var(--glass-border); color: rgba(255,255,255,0.5); padding: 12px 30px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tab-btn.active { background: var(--accent-gold); color: black; border-color: var(--accent-gold); box-shadow: 0 0 20px rgba(255,183,3,0.3); }

        .order-grid { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        .order-card-new { 
            background: #0f0f0f; border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 1.5rem; margin-bottom: 1.5rem; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .order-card-new:hover { border-color: var(--accent-gold); transform: translateY(-3px); background: #151515; }
        
        .status-light { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-preparing { background: #f39c12; box-shadow: 0 0 10px #f39c12; }
        .status-shipping { background: #9b59b6; box-shadow: 0 0 10px #9b59b6; }
        .status-delivered { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }

        /* --- DETAILS MODAL --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(10px); }
        .details-card { background: #111; border: 1px solid var(--glass-border); width: 100%; max-width: 500px; border-radius: 30px; padding: 2.5rem; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; opacity: 0.5; }

        .tracking-bar { height: 4px; background: #222; border-radius: 10px; margin: 2rem 0; position: relative; display: flex; justify-content: space-between; }
        .tracking-point { width: 12px; height: 12px; border-radius: 50%; background: #333; margin-top: -4px; z-index: 10; position: relative; }
        .tracking-point.active { background: var(--accent-gold); box-shadow: 0 0 15px var(--accent-gold); }
        .tracking-line { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent-gold); z-index: 5; transition: 1s; width: 0%; }

        .item-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }
        
        @media (max-width: 768px) {
            .orders-hero { padding: 120px 0 30px; }
            .tab-container { gap: 0.5rem; }
            .tab-btn { padding: 10px 15px; font-size: 0.8rem; flex: 1; }
            .order-grid { padding: 0 10px; }
            .order-card-new { padding: 1rem; border-radius: 15px; }
            .order-card-new h4 { font-size: 0.8rem; }
            .details-card { padding: 1.5rem; border-radius: 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">PIZZA & BURGER <span>HUB</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="orders.html" class="active">My Orders</a></li>
        </ul>
        <div class="nav-right"><a href="menu.html" class="btn-luxury" style="padding: 10px 20px;">Support</a></div>
    </nav>

    <main>
        <section class="orders-hero">
            <h1 class="heading-luxury">Your <span>Orders</span></h1>
            <p style="opacity:0.5; margin-top: -20px;">Track live orders & view history</p>
        </section>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('active')">Ongoing Orders</button>
            <button class="tab-btn" onclick="switchTab('past')">Order History</button>
        </div>

        <div class="order-grid" id="orders-display">
            <!-- Orders load here -->
        </div>

        <div id="no-orders-ui" style="display:none; text-align:center; padding: 5rem;">
            <i class="fas fa-box-open" style="font-size: 4rem; opacity: 0.2; margin-bottom: 2rem;"></i>
            <p style="font-size: 1.2rem; opacity: 0.4;">Koi order nahi mila bhai!</p>
            <a href="menu.html" class="btn-luxury" style="display:inline-block; margin-top:2rem;">Start Shopping</a>
        </div>
    </main>

    <!-- Detailed View Modal -->
    <div class="modal-overlay" id="details-modal">
        <div class="details-card">
            <i class="fas fa-times close-modal" onclick="closeDetails()"></i>
            <h2 id="det-id" style="color:var(--accent-gold);">#------</h2>
            <p id="det-date" style="font-size:0.7rem; opacity:0.5; margin-bottom:1.5rem;">Ordered on ---</p>
            
            <div id="det-tracker" style="display:none;">
                <div class="tracking-bar">
                    <div class="tracking-line" id="progress-line"></div>
                    <div class="tracking-point active"></div>
                    <div class="tracking-point" id="pt-prep"></div>
                    <div class="tracking-point" id="pt-ship"></div>
                    <div class="tracking-point" id="pt-done"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.6rem; text-align:center; opacity:0.6;">
                    <span>PLACED</span><span>KITCHEN</span><span>ON WAY</span><span>ARRIVED</span>
                </div>
            </div>

            <h4 style="margin: 2rem 0 1rem; border-bottom: 1px solid #222; padding-bottom: 10px;">Order Summary</h4>
            <div id="det-items"></div>

            <div style="margin-top:2rem; padding:1.5rem; background: rgba(255,255,255,0.02); border-radius:15px;">
                <div class="item-row" style="font-weight:700; color:var(--accent-gold); font-size:1.1rem; border-top:1px solid #333; padding-top:10px;">
                    <span>Total Amount</span><span id="det-total">₹0</span>
                </div>
                <p id="det-address" style="font-size:0.7rem; opacity:0.5; margin-top:1.5rem;"><i class="fas fa-truck"></i> ---</p>
            </div>
            <button class="btn-luxury" style="width:100%; margin-top:2rem;" onclick="closeDetails()">Done</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Reuse socket from script.js (already loaded)
        let currentOrders = [];
        let activeTab = 'active';
        let orderFetchInProgress = false;

        async function fetchOrders() {
            if (orderFetchInProgress) return;
            orderFetchInProgress = true;
            
            const phone = localStorage.getItem('user_phone');
            if(!phone) { 
                document.getElementById('no-orders-ui').style.display='block'; 
                orderFetchInProgress = false;
                return; 
            }
            
            try {
                const all = await apiFetch(API_URL + '/orders');
                currentOrders = all.filter(o => o.custPhone === phone).reverse();
                document.getElementById('no-orders-ui').style.display = currentOrders.length === 0 ? 'block' : 'none';
                renderOrders();
            } catch (err) {
                console.error('Order fetch error:', err);
                document.getElementById('orders-display').innerHTML = `
                    <div style="text-align:center; padding:3rem;">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem; color:var(--primary-crimson); margin-bottom:1rem;"></i>
                        <p style="opacity:0.5;">Orders load nahi ho paaye</p>
                        <button class="btn-luxury" style="margin-top:1rem;" onclick="fetchOrders()">Retry</button>
                    </div>
                `;
            } finally {
                orderFetchInProgress = false;
            }
        }

        function renderOrders() {
            const display = document.getElementById('orders-display');
            const data = activeTab === 'active' 
                ? currentOrders.filter(o => o.status !== 'Delivered')
                : currentOrders.filter(o => o.status === 'Delivered');

            if(data.length === 0) {
                display.innerHTML = '<p style="text-align:center; opacity:0.3; padding:50px;">No ' + activeTab + ' orders found.</p>';
                return;
            }

            display.innerHTML = data.map(o => `
                <div class="order-card-new animated fadeIn" onclick="showDetails('${o.id}')">
                    <div style="display:flex; align-items:center; gap:20px;">
                        <div style="background:rgba(255,183,3,0.1); width:50px; height:50px; border-radius:15px; display:flex; align-items:center; justify-content:center; color:var(--accent-gold);">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div>
                            <h4 style="font-size:0.9rem;">Order #${o.id}</h4>
                            <p style="font-size:0.7rem; opacity:0.4;">${o.items.length} items • ₹${o.total}</p>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <span style="font-size:0.7rem; font-weight:700; color:${o.status === 'Delivered' ? '#2ecc71' : 'var(--accent-gold)'}">
                            <span class="status-light status-${o.status.toLowerCase().replace(' ', '-')}"></span>
                            ${o.status.toUpperCase()}
                        </span>
                        <p style="font-size:0.6rem; opacity:0.3; margin-top:5px;"><i class="fas fa-chevron-right"></i></p>
                    </div>
                </div>
            `).join('');
        }

        function showDetails(id) {
            const o = currentOrders.find(order => order.id === id);
            if(!o) return;

            document.getElementById('det-id').innerText = '#' + o.id;
            document.getElementById('det-date').innerText = 'Ordered on ' + new Date(o.createdAt).toLocaleString();
            document.getElementById('det-total').innerText = '₹' + o.total;
            document.getElementById('det-address').innerHTML = '<i class="fas fa-truck"></i> ' + o.custAddress;
            document.getElementById('det-items').innerHTML = o.items.map(i => `
                <div class="item-row"><span>${i.qty}x ${i.name}</span><span>₹${i.price * i.qty}</span></div>
            `).join('');

            // Tracker Logic
            const tracker = document.getElementById('det-tracker');
            if(o.status !== 'Delivered') {
                tracker.style.display = 'block';
                const prog = document.getElementById('progress-line');
                const pts = [document.getElementById('pt-prep'), document.getElementById('pt-ship'), document.getElementById('pt-done')];
                pts.forEach(p => p.classList.remove('active'));
                
                if(o.status === 'Order Placed') prog.style.width = '0%';
                if(o.status === 'Preparing') { prog.style.width = '33%'; pts[0].classList.add('active'); }
                if(o.status === 'Shipping') { prog.style.width = '66%'; pts[0].classList.add('active'); pts[1].classList.add('active'); }
            } else {
                tracker.style.display = 'none';
            }

            document.getElementById('details-modal').style.display = 'flex';
        }

        function closeDetails() { document.getElementById('details-modal').style.display = 'none'; }

        function switchTab(t) {
            activeTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderOrders();
        }

        socket.on('orderUpdated', fetchOrders);
        window.addEventListener('click', (e) => { if(e.target.className === 'modal-overlay') closeDetails(); });
        fetchOrders();
    </script>
</body>
</html>
