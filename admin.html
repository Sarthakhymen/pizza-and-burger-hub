<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Pizza & Burger Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { display: flex; height: 100vh; overflow: hidden; background: #050505; }
        .sidebar-elite {
            width: 280px; background: #0a0a0a; border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 2rem 0;
        }
        .main-dash { flex: 1; overflow-y: auto; padding: 3rem; background: radial-gradient(circle at top right, #1a0a0a, #050505); }
        
        .nav-item { padding: 15px 2rem; color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 1rem; }
        .nav-item:hover, .nav-item.active { color: var(--accent-gold); background: rgba(255,183,3,0.05); border-left: 4px solid var(--accent-gold); }
        
        .order-card-real { 
            background: #111; border: 1px solid var(--glass-border); border-radius: 20px; 
            margin-bottom: 2rem; overflow: hidden; transition: 0.3s;
        }
        .order-card-real:hover { border-color: var(--accent-gold); }
        .order-header { 
            padding: 1.5rem; background: rgba(255,255,255,0.02); display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border);
        }
        .order-body { padding: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .order-items { list-style: none; }
        .order-items li { margin-bottom: 0.5rem; color: var(--text-dim); }
        .order-items b { color: white; }
        
        .customer-info { border-left: 1px solid var(--glass-border); padding-left: 2rem; }
        .customer-info p { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .address-box { 
            background: rgba(255,183,3,0.05); color: var(--accent-gold); 
            padding: 1rem; border-radius: 12px; margin-top: 1rem; font-size: 0.8rem;
        }

        .status-btn-group { display: flex; gap: 10px; margin-top: 1.5rem; }
        .s-btn { 
            flex: 1; padding: 10px; border: 1px solid var(--glass-border); border-radius: 10px; 
            background: transparent; color: white; cursor: pointer; font-size: 0.7rem; transition: 0.3s;
        }
        .s-btn:hover { background: rgba(255,255,255,0.05); }
        .s-btn.active-status { background: var(--primary-crimson); border-color: var(--primary-crimson); font-weight: 700; }

        .stat-box { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        
        @media print { body * { visibility: hidden; } #bill-print-area, #bill-print-area * { visibility: visible; } #bill-print-area { position: absolute; left: 0; top: 0; width: 100%; display: block !important; color: black !important; } }
    </style>
</head>
<body>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="glass-card" style="width:400px; text-align:center;">
            <div class="logo">ADMIN <span>LOGIN</span></div>
            <p style="opacity:0.5; margin:1.5rem 0;">Enter PIN to continue</p>
            <input type="password" id="admin-pin" placeholder="PIN" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--glass-border); text-align:center; font-size:1.5rem; border-radius:12px; margin-bottom:1.5rem;">
            <button class="btn-luxury" style="width:100%;" onclick="checkPin()">Unlock</button>
        </div>
    </div>

    <aside class="sidebar-elite">
        <div class="logo" style="padding: 0 2rem 3rem;">HUB <span>ADMIN</span></div>
        <nav>
            <div class="nav-item active" onclick="showView('orders')" id="nav-orders"><i class="fas fa-shopping-basket"></i> Customer Orders</div>
            <div class="nav-item" onclick="showView('bookings')" id="nav-bookings"><i class="fas fa-calendar-check"></i> Table Bookings</div>
            <div class="nav-item" onclick="showView('menu')" id="nav-menu"><i class="fas fa-utensils"></i> Menu Manager</div>
            <div class="nav-item" onclick="showView('settings')" id="nav-settings"><i class="fas fa-tools"></i> Settings</div>
        </nav>
    </aside>

    <main class="main-dash">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3rem;">
            <h1 id="view-title">Live Orders</h1>
            <div style="display:flex; align-items:center; gap:1.5rem;">
                <div style="text-align:right;"><p style="font-weight:700;">Admin Sarthak</p><p style="font-size:0.6rem; opacity:0.5; color:var(--accent-gold);">SYSTEM ONLINE</p></div>
                <img src="https://ui-avatars.com/api/?name=Sarthak&background=FFB703&color=000" style="width:45px; border-radius:12px; border: 2px solid var(--accent-gold);">
            </div>
        </div>

        <div style="grid-template-columns: repeat(4, 1fr); display: grid; gap: 1.5rem; margin-bottom: 3rem;">
            <div class="stat-box"><div><h2 id="stat-revenue">₹0</h2><p style="font-size:0.6rem; opacity:0.4;">SALES</p></div></div>
            <div class="stat-box"><div><h2 id="stat-orders">0</h2><p style="font-size:0.6rem; opacity:0.4;">ORDERS</p></div></div>
            <div class="stat-box"><div><h2 id="stat-bookings">0</h2><p style="font-size:0.6rem; opacity:0.4;">BOOKINGS</p></div></div>
            <div class="stat-box"><div><h2 style="color:var(--accent-gold);">4.9</h2><p style="font-size:0.6rem; opacity:0.4;">RATING</p></div></div>
        </div>

        <section id="orders-view">
            <div id="admin-orders-list">
                <!-- Detailed Order Cards Appear Here -->
            </div>
        </section>

        <!-- Other Views (Simplified) -->
        <section id="bookings-view" style="display:none;">
            <div id="admin-bookings-list" class="glass-card"></div>
        </section>

        <section id="menu-view" style="display:none;">
            <div style="display:flex; justify-content:flex-end; margin-bottom:1rem;"><button class="btn-luxury" style="padding:10px 20px; font-size:0.8rem;" onclick="addNewItem()">+ Add Item</button></div>
            <div id="admin-menu-list"></div>
        </section>

        <section id="settings-view" style="display:none;">
            <div class="glass-card"><h3>System Settings</h3><p style="opacity:0.5;">Manage your app preferences.</p></div>
        </section>
    </main>

    <div id="bill-print-area"></div>
    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>

    <script>
        const socket = io();
        const API = 'http://localhost:5500/api';
        let data = { orders: [], bookings: [], menu: [] };

        function checkPin() {
            if (document.getElementById('admin-pin').value === 'admin123') {
                document.getElementById('login-overlay').style.display='none';
                init();
            } else alert('Wrong PIN!');
        }

        function showView(v) {
            ['orders','bookings','menu','settings'].forEach(id => document.getElementById(id+'-view').style.display = id===v ? 'block':'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-'+v).classList.add('active');
            document.getElementById('view-title').innerText = v.toUpperCase();
        }

        async function init() {
            await fetchAll();
            socket.on('newOrder', () => { document.getElementById('bell').play(); fetchAll(); });
            socket.on('orderUpdated', fetchAll);
            socket.on('menuUpdated', fetchAll);
        }

        async function fetchAll() {
            const [o, b, m] = await Promise.all([fetch(API+'/orders'), fetch(API+'/bookings'), fetch(API+'/menu')]);
            data = { orders: await o.json(), bookings: await b.json(), menu: await m.json() };
            renderAll();
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            return `${minutes} min ago`;
        }

        function renderAll() {
            document.getElementById('stat-revenue').innerText = '₹' + data.orders.reduce((s,o)=>s+o.total, 0);
            document.getElementById('stat-orders').innerText = data.orders.length;
            document.getElementById('stat-bookings').innerText = data.bookings.length;

            // REAL ORDER CARDS
            document.getElementById('admin-orders-list').innerHTML = data.orders.map(o => `
                <div class="order-card-real animate">
                    <div class="order-header">
                        <div>
                            <span style="color:var(--accent-gold); font-weight:800;">#${o.id}</span>
                            <span style="margin-left:1rem; opacity:0.5; font-size:0.8rem;">${getTimeAgo(o.createdAt)}</span>
                        </div>
                        <div>
                            <span class="status-badge" style="background:#2ecc7133; color:#2ecc71;">${o.status.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="order-body">
                        <div>
                            <h4 style="margin-bottom:1rem;">Order Items</h4>
                            <ul class="order-items">
                                ${o.items.map(i => `<li><b>${i.qty}x</b> ${i.name} <span style="float:right;">₹${i.price*i.qty}</span></li>`).join('')}
                            </ul>
                            <div style="margin-top:1.5rem; border-top:1px solid #333; padding-top:1rem; display:flex; justify-content:space-between;">
                                <span>Grand Total</span>
                                <span style="font-weight:800; color:var(--accent-gold); font-size:1.2rem;">₹${o.total}</span>
                            </div>
                        </div>
                        <div class="customer-info">
                            <h4>Customer Details</h4>
                            <p><i class="fas fa-user-circle"></i> <b>${o.custName}</b></p>
                            <p><i class="fas fa-phone-alt"></i> ${o.custPhone}</p>
                            <div class="address-box">
                                <b>Delivery Address:</b><br>${o.custAddress}
                            </div>
                            <div class="status-btn-group">
                                <button class="s-btn ${o.status==='Preparing'?'active-status':''}" onclick="updateS('${o.id}','Preparing')">PREPARE</button>
                                <button class="s-btn ${o.status==='Shipping'?'active-status':''}" onclick="updateS('${o.id}','Shipping')">SHIP</button>
                                <button class="s-btn ${o.status==='Delivered'?'active-status':''}" onclick="updateS('${o.id}','Delivered')">DONE</button>
                                <button class="s-btn" style="background:#3498db33;" onclick="printB('${o.id}')"><i class="fas fa-print"></i> BILL</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            // Simplified Menu List
            document.getElementById('admin-menu-list').innerHTML = `
                <table style="width:100%; color:white; border-collapse:collapse;">
                    ${data.menu.map(i => `<tr style="border-bottom:1px solid #222;"><td style="padding:15px;">${i.name}</td><td>₹${i.price}</td><td>${i.available?'IN STOCK':'OFF'}</td><td><button class="btn-luxury" style="padding:5px 12px; font-size:0.7rem;" onclick="updateM('${i.id}', ${i.price}, ${!i.available})">TOGGLE</button></td></tr>`).join('')}
                </table>
            `;
        }

        async function updateS(id, status) { await fetch(API+'/orders/'+id+'/status', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) }); fetchAll(); }
        async function updateM(id, price, available) { await fetch(API+'/menu/update', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, price:parseInt(price), available}) }); fetchAll(); }

        function printB(id) {
            const o = data.orders.find(ord => ord.id === id);
            document.getElementById('bill-print-area').innerHTML = `<center style="color:black;"><h1>PIZZA & BURGER HUB</h1><h3>INVOICE #${o.id}</h3><hr><p>Customer: ${o.custName} (${o.custPhone})</p><p>Address: ${o.custAddress}</p><hr>${o.items.map(i=>`<p>${i.name} x ${i.qty} = ₹${i.price*i.qty}</p>`).join('')}<hr><h2>TOTAL: ₹${o.total}</h2></center>`;
            window.print();
        }
    </script>
</body>
</html>
